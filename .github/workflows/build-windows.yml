name: Build Windows

# Builds the full desktop app on Windows: Go engine sidecar + RapidOCR sidecar
# (PyInstaller) + Tauri (NSIS installer). Produces a downloadable artifact.
on:
  workflow_dispatch: {}
  push:
    tags: ["v*"]

permissions:
  contents: write # needed to attach the installer to a Release on tag

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: engine/go.sum

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust (src-tauri)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install JS deps
        run: npm install

      - name: Build Go engine sidecar
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/binaries | Out-Null
          Push-Location engine
          # Retry module download — proxy.golang.org TLS handshakes can time out.
          for ($i=1; $i -le 4; $i++) {
            go mod download
            if ($LASTEXITCODE -eq 0) { break }
            Write-Host "go mod download attempt $i failed; retrying in 10s..."
            Start-Sleep -Seconds 10
          }
          go build -o ../src-tauri/binaries/engine-x86_64-pc-windows-msvc.exe ./cmd/engine
          if ($LASTEXITCODE -ne 0) { throw "go build failed" }
          Pop-Location

      - name: Build OCR sidecar (RapidOCR via PyInstaller)
        run: |
          Push-Location ocr-sidecar
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller
          # --collect-all bundles the package data (ONNX models) PyInstaller misses.
          pyinstaller --onefile --name ocr-sidecar --collect-all rapidocr_onnxruntime app.py
          Copy-Item dist/ocr-sidecar.exe ../src-tauri/binaries/ocr-sidecar-x86_64-pc-windows-msvc.exe
          Pop-Location

      - name: Bundle ffmpeg + ffprobe
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path src-tauri/resources/ffmpeg | Out-Null
          # Retry — gyan.dev can be slow / time out the TLS handshake.
          for ($i=1; $i -le 4; $i++) {
            try { Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile ffmpeg.zip -TimeoutSec 120; break }
            catch { Write-Host "ffmpeg download attempt $i failed; retrying in 10s..."; Start-Sleep -Seconds 10 }
          }
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_extract
          $bin = Get-ChildItem -Recurse ffmpeg_extract -Filter ffmpeg.exe | Select-Object -First 1
          Copy-Item $bin.FullName src-tauri/resources/ffmpeg/ffmpeg.exe
          Copy-Item (Join-Path $bin.DirectoryName "ffprobe.exe") src-tauri/resources/ffmpeg/ffprobe.exe
          Get-ChildItem src-tauri/resources/ffmpeg

      - name: Bundle fonts (best-effort — a missing font won't fail the build)
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/resources/fonts | Out-Null
          function Get-Font($url, $name) {
            try {
              Invoke-WebRequest -Uri $url -OutFile (Join-Path "src-tauri/resources/fonts" $name)
              Write-Host "ok:   $name"
            } catch { Write-Host "skip: $name ($url)" }
          }
          # DejaVu (covers Latin + Vietnamese) — reliable release zip
          try {
            Invoke-WebRequest "https://github.com/dejavu-fonts/dejavu-fonts/releases/download/version_2_37/dejavu-fonts-ttf-2.37.zip" -OutFile dejavu.zip
            Expand-Archive dejavu.zip -DestinationPath dejavu
            Copy-Item (Get-ChildItem -Recurse dejavu -Filter DejaVuSans.ttf | Select-Object -First 1).FullName src-tauri/resources/fonts/DejaVuSans.ttf
            Copy-Item (Get-ChildItem -Recurse dejavu -Filter DejaVuSans-Bold.ttf | Select-Object -First 1).FullName src-tauri/resources/fonts/DejaVuSans-Bold.ttf
            Write-Host "ok:   DejaVu"
          } catch { Write-Host "skip: DejaVu" }
          # Noto Sans (Latin), Thai, CJK
          Get-Font "https://github.com/googlefonts/noto-fonts/raw/main/hinted/ttf/NotoSans/NotoSans-Regular.ttf" "NotoSans-Regular.ttf"
          Get-Font "https://github.com/googlefonts/noto-fonts/raw/main/hinted/ttf/NotoSans/NotoSans-Bold.ttf" "NotoSans-Bold.ttf"
          Get-Font "https://github.com/googlefonts/noto-fonts/raw/main/hinted/ttf/NotoSansThai/NotoSansThai-ExtraBold.ttf" "NotoSansThai-ExtraBold.ttf"
          Get-Font "https://github.com/notofonts/noto-cjk/raw/main/Sans/OTC/NotoSansCJK-Regular.ttc" "NotoSansCJK-Regular.ttc"
          Get-Font "https://github.com/notofonts/noto-cjk/raw/main/Sans/OTC/NotoSansCJK-Bold.ttc" "NotoSansCJK-Bold.ttc"
          Write-Host "--- bundled fonts ---"
          Get-ChildItem src-tauri/resources/fonts

      - name: Tauri build (NSIS installer)
        run: npm run tauri build

      - name: Upload installer (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: auto-reup-windows-installer
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Publish Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/bundle/nsis/*.exe
          generate_release_notes: true